# Render.com deployment manifest for Rush Fitness GMS.
# After this file lands on `main`, click "New → Blueprint" in Render's
# dashboard, point it at this repo, and Render will auto-create:
#   • the PostgreSQL database
#   • the Node.js backend (with migrations + seed run on every deploy)
#   • the React static site
# The service URLs are predictable from the names below.

# The Postgres instance was migrated from Oregon (free) to Frankfurt to
# reduce round-trip latency to Uganda. Name + region MUST match the
# existing dashboard entry exactly so Blueprint adopts it instead of
# trying to create a duplicate:
#
#   Dashboard name → rush-fitness-db-fra   (region: frankfurt)
#
# If future syncs still fail with a plan-mismatch error, update `plan:`
# below to match whatever tier the DB is actually on in the dashboard
# (Settings → Instance Type). Free tier is Ohio-only, so a Frankfurt DB
# is always on a paid plan — most likely basic-256mb.
databases:
  - name: rush-fitness-db-fra
    region: frankfurt
    plan: basic-256mb             # ⚠ Verify against the dashboard before pushing.
    databaseName: rush_fitness_gms
    user: rush_fitness
    postgresMajorVersion: 16

services:
  # ── Backend API ────────────────────────────────────────────────
  - type: web
    name: rush-fitness-api
    runtime: node
    plan: starter                 # $7/mo — always-on, no cold starts
    # Must be co-located with rush-fitness-db-fra so the internal DNS
    # (postgres.render-internal) resolves — Render's private network only
    # spans a single region. The API itself was migrated to Frankfurt
    # alongside the DB.
    region: frankfurt
    rootDir: backend
    buildCommand: npm install
    # Run migrations + seed before every deploy. Seed is idempotent.
    preDeployCommand: npm run db:migrate && npm run db:seed
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      # Timezone — the gym operates in East Africa Time (EAT, UTC+3, no DST).
      # TZ pins the Node runtime clock so `new Date()` / `Date.now()` and any
      # log timestamps land in EAT. PGTZ tells the `pg` client to `SET TIME
      # ZONE` on connection, so CURRENT_DATE / NOW()::date in queries (e.g.
      # backend/src/routes/dashboard.js) evaluate against the local calendar
      # date instead of UTC — otherwise the dashboard shows the previous
      # day's numbers between 00:00 and 02:59 EAT.
      # Africa/Kampala and Africa/Nairobi share the same offset; both are
      # equivalent for our purposes.
      - key: TZ
        value: Africa/Kampala
      - key: PGTZ
        value: Africa/Kampala
      - key: DATABASE_URL
        fromDatabase:
          name: rush-fitness-db-fra
          property: connectionString
      - key: JWT_SECRET
        generateValue: true       # Render generates a 256-bit random value
      - key: CORS_ORIGIN
        value: https://rush-fitness-gms.onrender.com
      - key: BCRYPT_ROUNDS
        value: "10"
      # Rush Fitness operates in Uganda — all prices are Uganda Shillings.
      # Payments API and product sales stamp this on every row as `currency`.
      - key: CURRENCY
        value: UGX

  # ── Frontend (React static build) ──────────────────────────────
  # NOTE: static sites are served from Render's global CDN — no `region` allowed.
  - type: web
    name: rush-fitness-gms
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    pullRequestPreviewsEnabled: false
    envVars:
      # Build-time var — baked into the JS bundle.
      - key: REACT_APP_API_URL
        value: https://rush-fitness-api.onrender.com
      # CRA prefers GENERATE_SOURCEMAP=false in prod to keep the bundle small.
      - key: GENERATE_SOURCEMAP
        value: "false"
      # CRA fails the build on lint warnings unless we set this.
      - key: CI
        value: "false"
    # SPA fallback — every unknown URL serves /index.html so React Router works.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    # Cache static assets aggressively, never cache index.html.
    headers:
      - path: /static/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
